name: Refresh ClawHub Stats

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh stats from ClawHub API
        run: node scripts/refresh-stats.js

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "chore: refresh clawhub stats [skip ci]"
          git push

      - name: Summary
        run: |
          echo "### ClawHub Stats Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "const d=require('./data/en/index.json');console.log('- Total skills (en): ' + d.total);console.log('- Updated: ' + d.generated);" >> $GITHUB_STEP_SUMMARY
